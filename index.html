<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <a class="active" href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="stage">
    <div class="stars" aria-hidden="true"></div>
    <div class="halo" aria-hidden="true"></div>

    <section class="card" id="card">
      <div class="badge"><span class="spark"></span> First Light Online</div>
      <h1><span class="gradient-text">Hello World</span></h1>
      <p class="lead" id="message">A tiny page with a little glow, a little motion, and a button that refuses to just sit there.</p>
      <div class="actions">
        <button id="surpriseBtn" type="button">Make it sparkle</button>
        <button class="secondary" id="colorBtn" type="button">Change the mood</button>
        <a class="button secondary" href="about.html">Meet the page</a>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite">Hello, beautifully.</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
