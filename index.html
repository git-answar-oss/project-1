<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a12;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #f8fbff;
      --muted: #aeb8c8;
      --cyan: #46e0ff;
      --lime: #c6ff5f;
      --coral: #ff6f91;
      --amber: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 25%, rgba(70, 224, 255, 0.28), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(255, 209, 102, 0.24), transparent 28%),
        radial-gradient(circle at 70% 80%, rgba(255, 111, 145, 0.26), transparent 34%),
        linear-gradient(135deg, #080a12 0%, #141827 52%, #071014 100%);
      color: var(--text);
    }

    .stage {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
      isolation: isolate;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 255, 255, 0.45) 0 1px, transparent 1.5px);
      background-position: 0 0, 48px 64px;
      background-size: 110px 110px, 150px 150px;
      opacity: 0.36;
      animation: drift 24s linear infinite;
    }

    .halo {
      position: absolute;
      width: min(82vw, 760px);
      aspect-ratio: 1;
      border-radius: 50%;
      z-index: -1;
      background: conic-gradient(from 120deg, var(--cyan), var(--lime), var(--amber), var(--coral), var(--cyan));
      filter: blur(42px);
      opacity: 0.22;
      animation: spin 14s linear infinite;
    }

    .card {
      width: min(720px, 100%);
      padding: clamp(28px, 7vw, 64px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42), inset 0 1px rgba(255, 255, 255, 0.22);
      text-align: center;
      backdrop-filter: blur(22px);
      transform-style: preserve-3d;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.38);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 36px;
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spark {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 20px var(--lime);
    }

    h1 {
      margin: 28px 0 10px;
      font-size: clamp(3rem, 13vw, 8.4rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .gradient-text {
      background: linear-gradient(90deg, #ffffff, var(--cyan), var(--lime), var(--amber));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 220% 100%;
      animation: shimmer 5s ease-in-out infinite;
    }

    p {
      max-width: 560px;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.65;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    button {
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 14px;
      background: var(--text);
      color: #071014;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.25);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    button:active {
      transform: translateY(0) scale(0.98);
    }

    .secondary {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      background: rgba(8, 10, 18, 0.74);
      color: var(--text);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 18px);
      transition: opacity 220ms ease, transform 220ms ease;
      backdrop-filter: blur(16px);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes drift {
      to { background-position: 110px 110px, 198px 214px; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 520px) {
      body {
        overflow-y: auto;
      }

      .card {
        border-radius: 22px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="stars" aria-hidden="true"></div>
    <div class="halo" aria-hidden="true"></div>

    <section class="card" id="card">
      <div class="badge"><span class="spark"></span> First Light Online</div>
      <h1><span class="gradient-text">Hello World</span></h1>
      <p id="message">A tiny page with a little glow, a little motion, and a button that refuses to just sit there.</p>
      <div class="actions">
        <button id="surpriseBtn" type="button">Make it sparkle</button>
        <button class="secondary" id="colorBtn" type="button">Change the mood</button>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite">Hello, beautifully.</div>
  </main>

  <script>
    const card = document.querySelector("#card");
    const toast = document.querySelector("#toast");
    const surpriseBtn = document.querySelector("#surpriseBtn");
    const colorBtn = document.querySelector("#colorBtn");
    const message = document.querySelector("#message");

    const moods = [
      ["#46e0ff", "#c6ff5f", "#ff6f91", "A brighter mood just arrived."],
      ["#7cf7d4", "#ffe66d", "#ff8c42", "Warm, crisp, and ready to launch."],
      ["#9dff7a", "#56cfe1", "#f72585", "Fresh energy, same friendly hello."],
      ["#ffd166", "#06d6a0", "#ef476f", "A little festival of pixels."],
    ];

    let moodIndex = 0;
    let toastTimer;

    document.addEventListener("pointermove", (event) => {
      const rect = card.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const rotateX = ((y / rect.height) - 0.5) * -8;
      const rotateY = ((x / rect.width) - 0.5) * 8;
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    document.addEventListener("pointerleave", () => {
      card.style.transform = "rotateX(0deg) rotateY(0deg)";
    });

    surpriseBtn.addEventListener("click", () => {
      showToast("Sparkle mode: absolutely engaged.");
      burstConfetti();
    });

    colorBtn.addEventListener("click", () => {
      moodIndex = (moodIndex + 1) % moods.length;
      const [cyan, lime, coral, text] = moods[moodIndex];
      document.documentElement.style.setProperty("--cyan", cyan);
      document.documentElement.style.setProperty("--lime", lime);
      document.documentElement.style.setProperty("--coral", coral);
      message.textContent = text;
      showToast("Mood shifted.");
    });

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function burstConfetti() {
      for (let i = 0; i < 36; i += 1) {
        const piece = document.createElement("span");
        const size = Math.random() * 8 + 5;
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 170 + 70;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        piece.style.cssText = `
          position: fixed;
          left: 50%;
          top: 50%;
          width: ${size}px;
          height: ${size}px;
          border-radius: ${Math.random() > 0.5 ? "50%" : "3px"};
          background: hsl(${Math.random() * 360}, 95%, 68%);
          pointer-events: none;
          z-index: 10;
          transform: translate(-50%, -50%);
          transition: transform 780ms cubic-bezier(.14,.76,.18,1), opacity 780ms ease;
        `;

        document.body.appendChild(piece);
        requestAnimationFrame(() => {
          piece.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${Math.random() * 520}deg)`;
          piece.style.opacity = "0";
        });
        setTimeout(() => piece.remove(), 820);
      }
    }
  </script>
</body>
</html>
